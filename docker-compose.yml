name: faithos

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-faithos}
      POSTGRES_USER: ${POSTGRES_USER:-faithos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-faithos}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - faithos
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - faithos
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  mailpit:
    image: axllent/mailpit:v1.30.0
    restart: unless-stopped
    ports:
      - '${SMTP_PORT:-1025}:1025'
      - '${MAILPIT_UI_PORT:-8025}:8025'
    networks:
      - faithos

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: development
      HOST: 0.0.0.0
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-faithos}:${POSTGRES_PASSWORD:-faithos}@postgres:5432/${POSTGRES_DB:-faithos}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-faithos-local-jwt-secret-change-me}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-faithos-local-refresh-secret-change-me}
      JWT_ACCESS_TTL_SECONDS: ${JWT_ACCESS_TTL_SECONDS:-900}
      JWT_REFRESH_TTL_SECONDS: ${JWT_REFRESH_TTL_SECONDS:-604800}
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      ATTACHMENT_STORAGE_DIR: /workspace/storage/attachments
    ports:
      - '${API_PORT:-3001}:3001'
    volumes:
      - ./apps/api/src:/workspace/apps/api/src
    networks:
      - faithos
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailpit:
        condition: service_started
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '--no-verbose',
          '--tries=1',
          '--spider',
          'http://127.0.0.1:3001/health',
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: development
      HOSTNAME: 0.0.0.0
      PORT: 3000
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
    ports:
      - '${WEB_PORT:-3000}:3000'
    volumes:
      - ./apps/web/app:/workspace/apps/web/app
    networks:
      - faithos
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '--no-verbose',
          '--tries=1',
          '--spider',
          'http://127.0.0.1:3000/health',
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

volumes:
  postgres_data:
  redis_data:

networks:
  faithos:
    driver: bridge
